name: Build All and Publish

on:
  workflow_dispatch:
    inputs:
      force-build:
        description: Force the build of all packages
        type: boolean
        default: false
      branch:
        description: The branch to build
        type: choice
        options:
          - beta
          - master
          - oldstable
        default: master

env:
  CARCH: x86_64

jobs:
  _setup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/draft-release
        with:
          branch: ${{ inputs.branch }}
          force-build: ${{ inputs.force-build }}
          app-client-id: ${{ vars.APP_CLIENT_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
  xlibre-input-elographics:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-xserver
    with:
      package: xlibre-input-elographics
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-input-evdev:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-xserver
    with:
      package: xlibre-input-evdev
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-input-libinput:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-xserver
    with:
      package: xlibre-input-libinput
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-input-synaptics:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-xserver
    with:
      package: xlibre-input-synaptics
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-input-vmmouse:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-xserver
    with:
      package: xlibre-input-vmmouse
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-input-void:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-xserver
    with:
      package: xlibre-input-void
