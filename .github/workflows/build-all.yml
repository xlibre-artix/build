      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-meta:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-input-libinput
      - xlibre-xserver
    with:
      package: xlibre-meta
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-video-amdgpu:
