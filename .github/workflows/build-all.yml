    secrets: inherit

  xlibre-video-dummy:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
      - xlibre-xserver
    with:
      package: xlibre-video-dummy
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  xlibre-video-fbdev:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
