  xlibre-xserver:
    uses: ./.github/workflows/build-package.yml
    needs:
      - _setup
    with:
      package: xlibre-xserver
      branch: ${{ inputs.branch }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit

  all-packages:
    runs-on: ubuntu-24.04
    needs:
      - xlibre-input-elographics
      - xlibre-input-evdev
      - xlibre-input-libinput
      - xlibre-input-synaptics
      - xlibre-input-vmmouse
      - xlibre-input-void
      - xlibre-input-wacom
      - xlibre-meta
      - xlibre-video-amdgpu
      - xlibre-video-ati
      - xlibre-video-dummy
      - xlibre-video-fbdev
      - xlibre-video-intel
      - xlibre-video-nouveau
      - xlibre-video-qxl
      - xlibre-video-sisusb
      - xlibre-video-vesa
      - xlibre-video-vmware
      - xlibre-video-voodoo
      - xlibre-xserver
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/release-packages
        with:
          repository: ${{ vars.PACKAGES_REPOSITORY }}
          branch: ${{ inputs.branch }}
          repo-db-prefix: ${{ vars.REPO_DB_PREFIX }}
          app-client-id: ${{ vars.APP_CLIENT_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
